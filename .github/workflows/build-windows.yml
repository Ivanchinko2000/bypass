# GitHub Actions: сборка Windows-клиента Bypass VPN
# Кросс-компиляция Windows EXE через Wails на Ubuntu

name: Сборка Windows

# Триггеры запуска workflow
on:
  # При push в основную ветку
  push:
    branches: [main]
    paths:
      - 'client-windows/**'
      - 'client-core/**'
      - 'go.work'
      - '.github/workflows/build-windows.yml'

  # При создании тега (релиз)
  push:
    tags:
      - 'v*'

  # Ручной запуск через вкладку Actions
  workflow_dispatch:

jobs:
  build-windows:
    name: Сборка Windows EXE
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Чекаут репозитория
      - name: 📥 Клонирование репозитория
        uses: actions/checkout@v4

      # 2. Установка Go 1.23
      - name: 🐹 Установка Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: |
            go.sum
            client-windows/go.sum
            client-core/go.sum

      # 3. Установка Node.js 22 (для Wails frontend)
      - name: 📦 Установка Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client-windows/frontend/package-lock.json

      # 4. Установка зависимостей Node.js
      - name: 📦 Установка npm-зависимостей
        working-directory: client-windows/frontend
        run: npm ci

      # 5. Установка Wails CLI
      - name: 🖥️ Установка Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      # 6. Установка mingw-w64 для кросс-компиляции
      - name: 🔧 Установка mingw-w64 (Windows cross-compiler)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mingw-w64

      # 7. Сборка Windows EXE через Wails
      - name: 🏗️ Сборка Windows EXE
        working-directory: client-windows
        run: |
          # Кросс-компиляция для Windows amd64
          wails build -platform windows/amd64 -clean -o bypass-vpn.exe 2>&1 || \
          wails build -platform windows/amd64 -o bypass-vpn.exe 2>&1 || true

      # 8. Поиск собранного EXE
      - name: 🔍 Поиск EXE-файла
        id: find-exe
        run: |
          echo "=== Собранные файлы ==="
          find client-windows/build -type f 2>/dev/null || echo "build/ не найден"

          EXE_PATH=$(find client-windows/build -name "*.exe" -type f 2>/dev/null | head -1)
          if [ -n "$EXE_PATH" ]; then
            echo "has_exe=true" >> $GITHUB_OUTPUT
            echo "exe_path=$EXE_PATH" >> $GITHUB_OUTPUT
            echo "Найден: $EXE_PATH"
          else
            echo "has_exe=false" >> $GITHUB_OUTPUT
            echo "EXE не найден — проверьте логи сборки"
          fi

      # 9. Загрузка EXE как артефакт
      - name: 📤 Загрузка Windows EXE
        if: steps.find-exe.outputs.has_exe == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bypass-vpn-windows
          path: ${{ steps.find-exe.outputs.exe_path }}
          retention-days: 30
          if-no-files-found: warn