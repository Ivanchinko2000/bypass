# GitHub Actions: сборка серверного бинарника Bypass VPN
# Сборка Linux amd64 и загрузка как артефакт

name: Сборка сервера

# Триггеры запуска workflow
on:
  # При push в основную ветку
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'client-core/**'
      - 'go.work'
      - '.github/workflows/build-server.yml'

  # При создании тега (релиз)
  push:
    tags:
      - 'v*'

  # Ручной запуск через вкладку Actions
  workflow_dispatch:

jobs:
  build-server:
    name: Сборка Linux amd64
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Чекаут репозитория
      - name: 📥 Клонирование репозитория
        uses: actions/checkout@v4

      # 2. Установка Go 1.23
      - name: 🐹 Установка Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: |
            go.sum
            server/go.sum
            client-core/go.sum

      # 3. Сборка серверного бинарника (Linux amd64, статический)
      - name: 🏗️ Сборка сервера
        working-directory: server
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: |
          # Статическая компиляция без CGO
          go build -trimpath -ldflags="-s -w" \
            -o ../bypass-server-linux-amd64 \
            ./cmd/server/

          # Проверяем, что бинарник собрался
          ls -lh ../bypass-server-linux-amd64

      # 4. Загрузка артефакта
      - name: 📤 Загрузка серверного бинарника
        uses: actions/upload-artifact@v4
        with:
          name: bypass-server-linux-amd64
          path: bypass-server-linux-amd64
          retention-days: 30
          if-no-files-found: error